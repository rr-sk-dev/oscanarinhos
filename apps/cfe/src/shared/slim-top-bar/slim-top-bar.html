<nav class="hidden md:block fixed top-0 left-0 right-0 z-50 bg-cui-grey-900 border-b border-white/10">
  <div class="h-14 flex items-center justify-between px-6 lg:px-8 max-w-5xl mx-auto">
    <!-- Logo + Team Name -->
    <a routerLink="/home" class="flex items-center gap-2.5 hover:opacity-80 transition-opacity">
      @if (teamLogo()) {
        <img [src]="teamLogo()!" [alt]="teamName" class="w-9 h-9 object-contain" />
      }
      <span class="text-sm font-bold text-cui-text-on-light-primary tracking-tight">
        {{ teamName }}
      </span>
    </a>

    <!-- Nav Items -->
    <div class="flex items-center gap-1">
      @for (item of items; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: false }"
          class="nav-link relative px-3 py-1.5 text-sm font-medium rounded-lg transition-colors"
          [class.text-cui-text-on-light-secondary]="!isActive(item.route)"
          [class.hover:text-cui-text-on-light-primary]="!isActive(item.route)"
          [class.hover:bg-cui-grey-100]="!isActive(item.route)"
          [class.text-white]="isActive(item.route)"
        >
          {{ item.label }}
          <!-- Active dot -->
          <span
            class="absolute bottom-0 left-1/2 -translate-x-1/2 w-1 h-1 rounded-full bg-cui-yellow-500 transition-opacity"
            [class.opacity-0]="!isActive(item.route)"
            [class.opacity-100]="isActive(item.route)"
          ></span>
        </a>
      }

      <!-- Live CTA -->
      <a
        routerLink="/live"
        class="ml-3 flex items-center gap-1.5 px-3 py-1.5 bg-cui-grey-900 text-white text-xs font-semibold rounded-lg hover:bg-cui-grey-800 transition-colors"
      >
        <cui-svg-icon name="live" [size]="16" />
        Ao Vivo
      </a>
    </div>
  </div>
</nav>
