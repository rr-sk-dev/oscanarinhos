<nav class="md:hidden fixed bottom-0 left-0 right-0 z-50 bg-cui-grey-900 border-t border-white/10 safe-bottom">
  <div class="flex items-stretch justify-around h-16">
    @for (tab of tabs; track tab.route) {
      <a
        [routerLink]="tab.route"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: false }"
        class="tab-item flex flex-col items-center justify-center flex-1 gap-0.5 pt-1.5 transition-colors relative"
        [class.text-white/40]="!isActive(tab.route)"
        [class.text-white]="isActive(tab.route)"
      >
        <!-- Active indicator bar -->
        <span
          class="absolute top-0 left-1/2 -translate-x-1/2 h-0.5 rounded-full bg-cui-yellow-500 transition-all duration-200"
          [class.w-5]="isActive(tab.route)"
          [class.w-0]="!isActive(tab.route)"
        ></span>

        <cui-svg-icon [name]="tab.icon" [size]="22" />
        <span class="text-[10px] font-medium leading-tight">{{ tab.label }}</span>
      </a>
    }
  </div>
</nav>
