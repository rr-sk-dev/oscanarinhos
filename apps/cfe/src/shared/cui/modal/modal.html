@if (isOpen()) {
<!-- Backdrop -->
<div
  class="fixed inset-0 bg-black/60 z-[1000] animate-fade-in"
  (click)="onBackdropClick()"
  [attr.aria-hidden]="true"
></div>

<!-- Modal -->
<div
  class="fixed inset-0 z-[1001] overflow-y-auto"
  role="dialog"
  aria-modal="true"
  [attr.aria-labelledby]="title() ? 'modal-title' : null"
>
  <div class="flex min-h-full items-center justify-center p-4">
    <div
      #modalContent
      [class]="modalClasses()"
      (click)="$event.stopPropagation()"
    >
      <!-- Header -->
      @if (title() || showCloseButton()) {
      <div
        class="flex items-center justify-between p-6 border-b border-cui-border-on-light"
      >
        @if (title()) {
        <h2
          id="modal-title"
          class="text-xl font-semibold text-cui-text-on-light-primary"
        >
          {{ title() }}
        </h2>
        } @if (showCloseButton()) {
        <button
          type="button"
          (click)="close.emit()"
          class="ml-auto text-cui-text-on-light-secondary hover:text-cui-text-on-light-primary transition-colors"
          aria-label="Close modal"
        >
          <svg
            class="w-6 h-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        </button>
        }
      </div>
      }

      <!-- Body -->
      <div class="p-6">
        <ng-content />
      </div>

      <!-- Footer (optional) -->
      @if (hasFooter()) {
      <div
        class="flex items-center justify-end gap-3 p-6 border-t border-cui-border-on-light"
      >
        <ng-content select="[modal-footer]" />
      </div>
      }
    </div>
  </div>
</div>
}
