<div
  class="card bg-cui-white rounded-2xl shadow-lg overflow-hidden transition-all duration-200 hover:shadow-xl hover:scale-[1.02]"
  [class.cursor-pointer]="!ctaUrl()"
  (click)="onCardClick()"
>
  <!-- Image (optional) -->
  @if (image()) {
  <div class="relative w-full aspect-video bg-cui-grey-200 overflow-hidden">
    <img
      [src]="image()!"
      [alt]="imageAlt()"
      loading="lazy"
      decoding="async"
      class="w-full h-full object-cover"
    />
  </div>
  }

  <!-- Content -->
  <div class="p-6">
    <!-- Date -->
    @if (date()) {
    <p class="text-sm text-cui-text-on-light-secondary mb-3">{{ date() }}</p>
    }

    <!-- Title -->
    <h3
      class="text-xl md:text-2xl font-bold text-cui-text-on-light-primary mb-3 leading-tight"
    >
      {{ title() }}
    </h3>

    <!-- Description -->
    @if (description()) {
    <p
      class="text-base text-cui-text-on-light-secondary mb-4"
      [class.line-clamp-3]="truncateDescription() && maxLines() === 3"
      [class.line-clamp-2]="truncateDescription() && maxLines() === 2"
      [class.line-clamp-4]="truncateDescription() && maxLines() === 4"
    >
      {{ description() }}
    </p>
    }

    <!-- CTA Link/Button -->
    @if (ctaUrl()) {
    <!-- Router Link -->
    <a
      [routerLink]="ctaUrl()"
      class="inline-flex items-center gap-2 text-cui-yellow-600 font-semibold hover:text-cui-yellow-700 transition-colors"
    >
      {{ ctaText() }}
      <svg
        class="w-5 h-5 transition-transform group-hover:translate-x-1"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M17 8l4 4m0 0l-4 4m4-4H3"
        />
      </svg>
    </a>
    } @else {
    <!-- Clickable Button (emits event) -->
    <button
      (click)="onCtaClick($event)"
      class="inline-flex items-center gap-2 text-cui-yellow-600 font-semibold hover:text-cui-yellow-700 transition-colors"
    >
      {{ ctaText() }}
      <svg
        class="w-5 h-5 transition-transform group-hover:translate-x-1"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M17 8l4 4m0 0l-4 4m4-4H3"
        />
      </svg>
    </button>
    }
  </div>
</div>
