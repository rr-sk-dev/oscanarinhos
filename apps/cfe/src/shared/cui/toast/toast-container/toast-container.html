<div
  class="fixed top-4 right-4 z-[9999] pointer-events-none"
  aria-live="polite"
  aria-atomic="true"
>
  <div class="flex flex-col pointer-events-auto">
    @for (toast of toastService.toasts(); track toast.id) {
    <cui-toast [toast]="toast" (close)="onClose($event)" />
    }
  </div>
</div>
