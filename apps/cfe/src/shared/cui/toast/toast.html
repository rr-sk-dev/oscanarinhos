<div
  [class]="toastClasses()"
  role="alert"
  aria-live="polite"
  aria-atomic="true"
>
  <!-- Icon -->
  <div class="flex-shrink-0">
    <span class="text-xl" [innerHTML]="icon()"></span>
  </div>

  <!-- Message -->
  <div class="flex-1 ml-3">
    <p class="text-sm font-medium">{{ toast().message }}</p>
  </div>

  <!-- Close button -->
  <button
    type="button"
    (click)="onClose()"
    class="flex-shrink-0 ml-4 inline-flex text-current opacity-50 hover:opacity-100 transition-opacity"
    aria-label="Close"
  >
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M6 18L18 6M6 6l12 12"
      />
    </svg>
  </button>
</div>
