<div class="relative">
  <div class="absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none">
    <cui-svg-icon name="search" [size]="20" color="#9CA3AF"></cui-svg-icon>
  </div>

  <input
    type="text"
    name="search-input"
    [value]="value()"
    [placeholder]="placeholder()"
    [disabled]="disabled()"
    (input)="onInput($event)"
    (focus)="onFocus()"
    (blur)="onBlur()"
    class="w-full pl-10 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent disabled:bg-gray-100 disabled:cursor-not-allowed placeholder:text-gray-400"
    [class.pr-10]="showClearButton()"
  />

  @if (showClearButton()) {
  <button
    type="button"
    (click)="clear()"
    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none focus:text-gray-600 transition-colors"
    aria-label="Clear search"
  >
    <cui-svg-icon
      name="close"
      [size]="16"
      color="currentColor"
      class="hover:cursor-pointer"
    ></cui-svg-icon>
  </button>
  }
</div>
