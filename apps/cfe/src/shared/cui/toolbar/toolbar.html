<header

>
  <div class="flex items-center justify-between h-16 px-4">
    <div class="flex items-center gap-3">
      <ng-content select="[left]" />
    </div>

    <div class="flex items-center px-4">
      <ng-content select="[center]" />
    </div>

    <div class="flex items-center gap-3">
      <ng-content select="[right]" />
    </div>
  </div>
</header>
